<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scraper App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="container mt-5">
    <h2 class="mb-4">Shopee Scraper</h2>

    <div class="row">
      <div class="col-12 col-md-6">
        <div class="input-group mb-3">
            <input type="text" id="keyword" class="form-control" placeholder="Enter keyword">
            <button class="btn btn-primary" onclick="search()">Search</button>
        </div>
      </div>
    </div>

    <div id="result"></div>

    <script>
      async function search() {
          const keyword = document.getElementById("keyword").value;
          const container = document.getElementById("result");
          container.innerHTML = "Loading...";

          try {
            const res = await fetch(`/search?keyword=${encodeURIComponent(keyword)}`);
            if (!res.ok) throw new Error('No products found or error occurred.');
            const data = await res.json();

            console.log(data);

            container.innerHTML = "";
            
            if (data.length === 0) {
              container.innerHTML = "<p>No products found or error occurred.</p>";
              return;
            }

            data.forEach((item, index) => {
                container.innerHTML += `
                    <div class="card mb-3 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${index + 1}. ${item.name}</h5>
                            <p class="card-text">Harga: <strong>Rp ${item.price.toLocaleString('id-ID')}</strong></p>
                            <a href="${item.link}" target="_blank" class="btn btn-primary btn-sm">
                                Lihat Produk
                            </a>
                        </div>
                    </div>
                `;
            });
          } catch (error) {
              console.error('Error:', error);
              container.innerHTML = `<p class="text-danger">Failed to fetch data: ${error.message}</p>`;
          }
      }
    </script>
</body>
</html>
